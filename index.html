<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masal Fabrikası | AI Story Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; color: white; margin-bottom: 20px; }
        .btn-primary { background-color: #6366f1; border: none; }
        .btn-secondary { background-color: #475569; border: none; }
        .voice-test-box { border-left: 4px solid #6366f1; padding-left: 15px; }
        .status-badge { font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; }
        pre { background: #000; padding: 15px; color: #10b981; border-radius: 8px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center mb-4">✨ Masal Fabrikası</h1>
        
        <div class="row">
            <div class="col-md-4">
                <div class="card p-3 shadow">
                    <h5>🛠️ Genel Ayarlar</h5>
                    <hr>
                    <label class="form-label">Masal Dili</label>
                    <select id="language" class="form-select mb-3">
                        <option value="tr">Türkçe</option>
                        <option value="en">English</option>
                    </select>

                    <label class="form-label">Masal Türü</label>
                    <select id="genre" class="form-select mb-3">
                        <option value="ancient_egypt">Antik Mısır</option>
                        <option value="anatolian">Anadolu Efsaneleri</option>
                        <option value="space">Uzay Çağı</option>
                        <option value="classic">Klasik Avrupa</option>
                    </select>

                    <button id="mainBtn" class="btn btn-primary w-100 py-2">🚀 Masalı ve MP3'ü Üret (1 Saat)</button>
                </div>

                <div class="card p-3 shadow voice-test-box">
                    <h5>🔊 Ses Test Paneli</h5>
                    <p class="small text-secondary">Microsoft TTS seslerini buradan test et.</p>
                    <select id="voiceSelect" class="form-select mb-2">
                        <option value="tr-TR-AhmetNeural">Ahmet (TR - Erkek)</option>
                        <option value="tr-TR-EmelNeural">Emel (TR - Kadın)</option>
                        <option value="en-US-AndrewMultilingualNeural">Andrew (Global - Erkek)</option>
                        <option value="en-US-AvaMultilingualNeural">Ava (Global - Kadın)</option>
                    </select>
                    <div class="input-group">
                        <input type="text" id="testText" class="form-control" placeholder="Deneme metni...">
                        <button onclick="testVoice()" class="btn btn-secondary">📢 Dinle</button>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card p-3 shadow">
                    <div class="d-flex justify-content-between">
                        <h5>📖 Üretilen Masal</h5>
                        <button id="downloadMp3" class="btn btn-sm btn-success d-none">📥 1 Saatlik MP3 İndir</button>
                    </div>
                    <div id="storyContent" class="mt-3 text-secondary" style="height: 300px; overflow-y: auto; border: 1px solid #334155; padding: 10px;">
                        Henüz masal üretilmedi...
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="card p-3 shadow">
                            <div class="d-flex justify-content-between align-items-center">
                                <h6>🎨 Görsel Prompt</h6>
                                <button onclick="generatePrompt()" class="btn btn-sm btn-outline-info">🔄 Yenile</button>
                            </div>
                            <pre id="imagePrompt" class="mt-2 small">...</pre>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card p-3 shadow">
                            <div class="d-flex justify-content-between align-items-center">
                                <h6>📺 YouTube SEO Paketi</h6>
                                <button onclick="generateSEO()" class="btn btn-sm btn-outline-info">🔄 Yenile</button>
                            </div>
                            <div id="seoContent" class="mt-2 small text-secondary">...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Frontend fonksiyonları buraya gelecek (Fetch API ile app.py'ye bağlanacak)
        function testVoice() {
            alert("Ses testi simüle ediliyor...");
        }
    </script>
</body>
</html>
